server:
  port: 8080

spring:
  application:
    name: backend

  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

sweetbook:
  api:
    base-url: ${SWEETBOOK_BASE_URL}
    key: ${SWEETBOOK_API_KEY}